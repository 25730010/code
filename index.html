<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE DEAD : ADVANCED VIDEO SYSTEM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;700&family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');

        :root {
            --neon-pink: #FF007F;
            --neon-blue: #4374D9;
            --toxic-green: #00FF88;
            --neon-red: #F15F5F;
            --neon-purple: #9D4EDD;
            --bg-black: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--bg-black); color: #fff; font-family: 'IBM Plex Sans KR', sans-serif; height: 100vh; overflow: hidden; }

        /* --- 비주얼 캔버스 --- */
        .visual-stage {
            width: 100%; height: 100%; position: relative;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #scene-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .video-fallback {
            position: absolute; inset: 0; z-index: 2;
            display: none; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a0a14, #000);
            font-family: 'Share Tech Mono'; color: var(--neon-pink); font-size: 13px;
            text-align: center; padding: 40px; letter-spacing: 1px; line-height: 1.6;
        }

        /* 번개 효과 */
        .lightning { position: fixed; inset: 0; background: #fff; opacity: 0; z-index: 1000; pointer-events: none; }
        .flash { animation: flash-anim 0.4s ease-out; }
        @keyframes flash-anim { 0% { opacity: 0.8; } 100% { opacity: 0; } }

        /* --- UI 레이아웃 --- */
        header {
            padding: 20px 40px; border-bottom: 2px solid var(--neon-pink);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.9); z-index: 500; position: relative;
        }
        .main-container { display: grid; grid-template-columns: 1fr 480px; height: calc(100vh - 80px); }

        .content-panel {
            padding: 40px; display: flex; flex-direction: column;
            background: rgba(5, 5, 5, 0.95); border-left: 2px solid var(--neon-pink);
            z-index: 10; overflow-y: auto; min-height: 0;
        }
        .scene-header { border-bottom: 1px solid var(--neon-blue); padding-bottom: 10px; flex: 0 0 auto; }
        .scene-id { font-family: 'Orbitron'; color: var(--neon-pink); font-size: 1.5rem; letter-spacing: 3px; }
        .scene-loc { font-size: 12px; color: var(--neon-blue); font-family: 'Share Tech Mono'; margin-top: 4px; }
        .narrative {
            font-size: 1.05rem; line-height: 1.8; color: #ccc;
            white-space: pre-line; overflow-wrap: break-word; word-break: keep-all;
            flex: 0 0 auto; margin: 20px 0;
        }

        /* --- 4대 지표 대시보드 --- */
        .stat-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);
            flex: 0 0 auto;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 2px;
            border-left: 3px solid var(--toxic-green);
        }
        .stat-label { font-family: 'Share Tech Mono'; font-size: 10px; color: #888; display: block; }
        .stat-num { font-family: 'Orbitron'; font-size: 1.2rem; color: #fff; }

        #btn-area { flex: 0 0 auto; }
        .choice-btn {
            display: block; width: 100%;
            padding: 15px; background: transparent; border: 1px solid var(--neon-blue);
            color: #fff; font-family: 'Orbitron'; font-size: 0.9rem; line-height: 1.4; cursor: pointer;
            text-align: left; transition: 0.3s; margin-bottom: 8px;
            white-space: normal; overflow-wrap: break-word;
        }
        .choice-btn:hover { background: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); padding-left: 25px; }

        /* --- Cover & Ending --- */
        #cover {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }
        #ending {
            position: fixed; inset: 0; background: #000; z-index: 2000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            border: 10px double var(--toxic-green); text-align: center; padding: 40px;
            overflow: hidden;
        }
        .bg-video {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.9; z-index: 0;
        }
        #cover > *:not(.bg-video),
        #ending > *:not(.bg-video) {
            position: relative; z-index: 1;
        }
        .cover-title { font-family: 'Orbitron'; font-size: 5rem; color: var(--neon-pink); text-shadow: 0 0 30px var(--neon-pink); margin-top: 10px; }
    </style>
</head>
<body>

<div id="lightning" class="lightning"></div>

<div id="cover">
    <video class="bg-video" src="media/S1.mp4" autoplay loop muted playsinline></video>
    <div style="font-family: 'Share Tech Mono'; color: var(--toxic-green); margin-bottom: 20px;">AUTHOR: 25730010 | 조한나</div>
    <h1 class="cover-title">CODE DEAD</h1>
    <div style="font-family:'Share Tech Mono'; color: #888; margin-top: 10px; letter-spacing: 2px;">BODY PART REPOSITORY</div>
    <button class="choice-btn" style="text-align:center; padding: 20px 80px; margin-top: 30px;" onclick="startGame()">▶ SYSTEM ACCESS</button>
</div>

<div id="ending">
    <video class="bg-video" src="media/S9.mp4" autoplay loop muted playsinline></video>
    <h2 id="end-title" style="font-family:'Orbitron'; font-size: 3rem;"></h2>
    <p id="end-msg" style="margin: 20px 0; font-size: 1.2rem;"></p>
    <button class="choice-btn" onclick="location.reload()">REBOOT</button>
</div>

<header>
    <div style="font-family:'Orbitron'; font-weight:900; color: var(--neon-pink); letter-spacing: 5px;">CODE DEAD // PROJECT</div>
    <div style="font-family:'Share Tech Mono'; color: var(--toxic-green);">SECURITY_LEVEL: OMEGA</div>
</header>

<main class="main-container">
    <div class="visual-stage">
        <video id="scene-video" autoplay loop muted playsinline></video>
        <div id="video-fallback" class="video-fallback"></div>
    </div>

    <div class="content-panel">
        <div class="scene-header">
            <div class="scene-id" id="ui-id">S1</div>
            <div class="scene-loc" id="ui-loc">LOCATION: DATA_SLUM_01</div>
        </div>
        <p class="narrative" id="ui-text"></p>

        <div id="btn-area" style="display:flex; flex-direction:column;"></div>

        <div class="stat-grid">
            <div class="stat-card" style="border-color: var(--toxic-green);"><span class="stat-label">SYNC (동기화)</span><div class="stat-num" id="st-sync">100</div></div>
            <div class="stat-card" style="border-color: var(--neon-blue);"><span class="stat-label">CRED (신뢰도)</span><div class="stat-num" id="st-cred">0</div></div>
            <div class="stat-card" style="border-color: var(--neon-pink);"><span class="stat-label">INTEG (무결성)</span><div class="stat-num" id="st-integ">0</div></div>
            <div class="stat-card" style="border-color: var(--neon-red);"><span class="stat-label">NOISE (발각도)</span><div class="stat-num" id="st-noise">0</div></div>
        </div>
    </div>
</main>

<script>
    let state = { sync: 100, cred: 0, integ: 0, noise: 0, current: 'S1' };

    /* ====================================================================
       영상 파일 안내
       - 이 폴더와 같은 위치에 "media" 폴더를 만들고 그 안에
         S1.mp4, S2.mp4 ... S9.mp4 를 넣으면 자동으로 재생됩니다.
       - 한글 파일명(예: 주인공.mp4)을 쓰고 싶으면 아래 scenario 객체의
         vid 값만 원하는 파일명으로 바꿔주면 돼요.
       - 영상이 없거나 로드 실패 시 텍스트 플레이스홀더가 대신 표시됩니다.
    ==================================================================== */

    const scenario = {
        // S1 ------------------------------------------------------------
        S1: {
            id: 'S1', loc: 'LOCATION: DATA_SLUM_01',
            vid: 'media/S1.mp4',
            text: '카메라가 K의 고통스러운 얼굴로 천천히 줌인된다. 왼쪽 손목의 ID 태그가 독성 핑크빛으로 격렬하게 깜빡이며 글리치 에러를 일으킨다. 네온 불빛이 반사되는 웅덩이 위로 비가 세차게 내린다.\n\n누군가 당신의 원본 로그를 삭제하고 있다. 미로 같은 데이터 슬럼을 뚫고 데이터를 확보해야 한다.',
            choices: [
                { t: '▶ 미로 속으로 진입', next: 'S2', s: 0, c: 0, i: 0, n: 5 }
            ]
        },

        // S2 ------------------------------------------------------------
        S2: {
            id: 'S2', loc: 'LOCATION: ABANDONED_SERVER_RACK',
            vid: 'media/S2.mp4',
            text: '오라클이 폐서버 랙 사이에 앉아 초록색 회로 기판을 씹으며 카메라를 향해 빛나는 생체 데이터 칩을 서서히 내민다. 낡은 CRT 모니터들이 어지럽게 깜빡이고, K는 그림자 속에서 굳어있다.\n\n"남의 로그를 약탈해서라도 이 미로를 나갈 텐가, 아니면 여기서 삭제될 텐가?"',
            choices: [
                { t: '데이터 칩 약탈', next: 'S3', s: 20, c: -15, i: -20, n: 15 },
                { t: '정직하게 거절', next: 'S3', s: -10, c: 20, i: 20, n: -5 }
            ]
        },

        // S3 ------------------------------------------------------------
        S3: {
            id: 'S3', loc: 'LOCATION: FAIRY_GATE',
            vid: 'media/S3.mp4',
            text: '시네마틱 와이드 숏. 선녀의 거대한 일렉트릭 퍼플 기계 날개가 장엄하고 천천히 활짝 펼쳐진다. 그녀의 눈에서 금속성 레이저 그리드가 뿜어져 나와 K의 몸을 위아래로 훑으며 스캔한다. 짙은 보라색 연기가 주위를 감싼다.',
            choices: [
                { t: '▶ 스캔을 받아들인다', next: 'S4', s: 0, c: 0, i: 0, n: 0 }
            ]
        },

        // S4 ------------------------------------------------------------
        S4: {
            id: 'S4', loc: 'LOCATION: SECURITY_CORRIDOR',
            vid: 'media/S4.mp4',
            text: '빠른 카메라 워킹의 역동적인 액션 숏. 보안 AI 팥쥐(PZ)가 공중에 부유한 채, 빛나는 일렉트릭 퍼플 가상 촉수들을 사방으로 격렬하게 휘두른다. 장갑의 QR 코드 패치가 실시간으로 빠르게 변동하며, 붉은 경고 레이저가 복도를 가로지른다.',
            choices: [
                { t: '정면 돌파 (강행)', next: 'BRANCH', s: 10, c: -15, i: -10, n: 25 },
                { t: '회피 기동 (은신)', next: 'BRANCH', s: -10, c: 10, i: 5, n: -15 }
            ]
        },

        // S5 (CRED 높음 - 신뢰 루트) -------------------------------------
        S5: {
            id: 'S5', loc: 'LOCATION: FAIRY_GATE // TRUST_CONFIRMED',
            vid: 'media/S5.mp4',
            text: '선녀의 레이저 스캔이 K를 감싼 뒤 확인을 마친다. 선녀는 거대한 기계 날개를 얌전하게 접고, 미소를 띠며 코어로 향하는 데이터 키를 넘겨준다. (신뢰도 가득)',
            choices: [
                { t: '▶ 데이터 키를 받는다', next: 'S7', s: 10, c: 15, i: 10, n: -10 }
            ]
        },

        // S6 (CRED 낮음 - 강제 돌파 루트) ----------------------------------
        S6: {
            id: 'S6', loc: 'LOCATION: CORRODED_METAL_CORRIDOR',
            vid: 'media/S6.mp4',
            text: '붉은 경보등이 격렬하게 번쩍이는 좁고 부식된 금속 복도. K가 벽에 박힌 터미널에 두꺼운 케이블을 강제로 꽂고 억지로 해킹을 시도한다. 손목 ID 태그가 핏빛으로 미친 듯이 깜빡인다. 땀과 피로 범벅된 얼굴, 고통스럽지만 필사적인 표정. 붉은 경고 레이저가 쏟아진다.\n\n[사운드] 요란하고 날카로운 경보 사이렌, 무겁게 왜곡된 신스 베이스, 전기 스파크 튀는 소리. 대사 없음.',
            choices: [
                { t: '▶ 강제로 코어를 뚫는다', next: 'S8', s: -15, c: -10, i: -15, n: 30 }
            ]
        },

        // S7 (신뢰 루트 - 평온한 진입) --------------------------------------
        S7: {
            id: 'S7', loc: 'LOCATION: CORE_ENTRANCE',
            vid: 'media/S7.mp4',
            text: '차분하고 어두운 푸른빛이 감도는 거대한 코어 입구. K가 선녀에게 받은 빛나는 데이터 키를 단말기에 조용히 삽입한다. 경보음 없이 부드러운 녹색 데이터 라인이 벽을 타고 흐르며, 육중한 금속 차단문이 소리 없이 열린다. K의 표정은 차분하고 집중되어 있으며, 손목의 태그는 안정적인 푸른색을 띤다.\n\n[사운드] 깊고 차분한 앰비언트 신스, 부드러운 디지털 잠금 해제 소리, 묵직한 문이 열리는 소리. 대사 없음.',
            choices: [
                { t: '▶ 코어 안으로 진입', next: 'S8', s: 5, c: 5, i: 5, n: -5 }
            ]
        },

        // S8 ------------------------------------------------------------
        S8: {
            id: 'S8', loc: 'LOCATION: CORE_CENTRAL // FINAL_BOSS',
            vid: 'media/S8.mp4',
            text: '코어의 중앙, 눈부신 백색광과 짙은 그림자가 대비되는 공간. K가 자신과 똑같이 생겼지만 피부에 기괴한 디지털 글리치 라인이 흐르는 \'복제체(Clone)\'와 처절하게 격돌한다. 두 사람이 거친 금속 바닥을 뒹굴며 거친 육탄전을 벌인다. 파괴적인 에너지가 스파크를 일으키며 사방으로 튀고, 역동적이고 흔들리는 카메라 움직임이 전투의 긴박함을 극대화한다.',
            choices: [
                { t: '정면 승부 (힘으로 제압)', next: 'S9', s: 15, c: 0, i: -10, n: 10 },
                { t: '해킹 우회 (코드로 무력화)', next: 'S9', s: -10, c: 10, i: 15, n: -20 }
            ]
        },

        // S9 ------------------------------------------------------------
        S9: {
            id: 'S9', loc: 'LOCATION: EXIT_GATE // ESCAPE',
            vid: 'media/S9.mp4',
            text: '복제체가 코드 파편으로 흩어지며 무너진다. 코어가 진동하며 카운트다운을 시작한다. K는 마지막 힘을 다해 출구를 향해 달린다. 등 뒤로 무너지는 데이터 구조물, 그리고 마침내 도달한 빛.\n\n최종 동기화를 실행하라.',
            choices: [
                { t: '▶ 최종 동기화 실행', action: () => checkEnd() }
            ]
        }
    };

    function triggerLightning() {
        const ln = document.getElementById('lightning');
        ln.classList.remove('flash');
        void ln.offsetWidth;
        ln.classList.add('flash');
    }

    function startGame() {
        document.getElementById('cover').style.display = 'none';
        updateUI('S1');
    }

    function updateUI(sid) {
        // S4 이후 분기 처리: CRED 누적치로 신뢰 루트(S5) / 강제 루트(S6) 결정
        if (sid === 'BRANCH') {
            sid = state.cred >= 10 ? 'S5' : 'S6';
        }

        const s = scenario[sid];
        state.current = sid;
        triggerLightning();

        // 씬별 영상 교체 로직 (영상이 없으면 텍스트 플레이스홀더로 대체)
        const video = document.getElementById('scene-video');
        const fallback = document.getElementById('video-fallback');

        if (s.vid) {
            video.style.display = 'block';
            fallback.style.display = 'none';
            video.onerror = () => {
                video.style.display = 'none';
                fallback.style.display = 'flex';
                fallback.innerText = '[ VIDEO SOURCE MISSING ]\n' + s.vid + '\n해당 경로에 영상 파일을 넣어주세요.';
            };
            video.src = s.vid;
            video.load();
            video.play().catch(() => {});
        } else {
            video.style.display = 'none';
            fallback.style.display = 'none';
        }

        document.getElementById('ui-id').innerText = s.id;
        document.getElementById('ui-loc').innerText = s.loc;
        document.getElementById('ui-text').innerText = s.text;
        document.getElementById('st-sync').innerText = state.sync;
        document.getElementById('st-cred').innerText = state.cred;
        document.getElementById('st-integ').innerText = state.integ;
        document.getElementById('st-noise').innerText = state.noise;

        const area = document.getElementById('btn-area');
        area.innerHTML = '';
        s.choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = c.t;
            btn.onclick = () => {
                state.sync += c.s || 0;
                state.cred += c.c || 0;
                state.integ += c.i || 0;
                state.noise += c.n || 0;
                if (c.action) c.action();
                else updateUI(c.next);
            };
            area.appendChild(btn);
        });
    }

    function checkEnd() {
        const end = document.getElementById('ending');
        const title = document.getElementById('end-title');
        const msg = document.getElementById('end-msg');
        end.style.display = 'flex';
        const endVideo = end.querySelector('.bg-video');
        if (endVideo) endVideo.play().catch(() => {});

        const finalScore = (state.sync * 0.5) + (state.cred * 0.5) - (state.noise * 0.2);
        if (finalScore >= 60) {
            title.innerText = "SUCCESS: RECOVERY";
            title.style.color = "var(--toxic-green)";
            msg.innerText = `조한나 님, 정체성 복구 성공. 판정 지수: ${finalScore.toFixed(1)}`;
        } else {
            title.innerText = "FAILURE: ERASED";
            title.style.color = "var(--neon-red)";
            msg.innerText = `데이터 소거 완료. 판정 지수: ${finalScore.toFixed(1)}`;
        }
    }
</script>
</body>
</html></html>
